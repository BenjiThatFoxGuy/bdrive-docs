on: [push, workflow_dispatch]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install --frozen-lockfile
      
      - name: Build Docs
        run: bun run docs:build
        env:
          NODE_ENV: production

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vitepress/dist --project-name=bdrive-docs --commit-dirty=true

  notify-bdrive:
    runs-on: ubuntu-latest
    name: Notify bdrive
    needs: deploy
    if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Dispatch docs-published to bdrive
        run: |
          curl --fail -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.BDRIVE_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/BenjiThatFoxGuy/bdrive/dispatches \
            -d '{"event_type":"docs-published","client_payload":{"repo":"${{ github.repository }}","sha":"${{ github.sha }}"}}'